# Build-check on every push/PR.
# Optional Cloudflare Pages deploy only on workflow_dispatch when secrets exist.
# Note: GitHub forbids referencing secrets in job-level `if` conditions — that
# previously caused the entire workflow to fail with zero jobs.

name: Build & optional Pages deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Verify dist outputs
        run: |
          test -f dist/index.html
          test -f dist/api.html
          test -f dist/developers.html
          test -f dist/api/v1/project.json
          test -f dist/openapi.yaml
          test -f dist/_headers
          test -f dist/_redirects

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    # Only manual runs; secrets checked in the step (not in job if — secrets break if:)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Require Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set repository secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID, or use Cloudflare Pages Git integration (see DEPLOY.md)."
            exit 1
          fi

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Manual only. Prefer Cloudflare Pages Git integration with EMPTY deploy command.
          command: pages deploy dist --project-name=mossymesh-com
