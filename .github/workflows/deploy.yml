# Optional CI: build-check on every push/PR.
# Primary production deploy is Cloudflare Pages Git integration (see DEPLOY.md).
# Set secrets only if you enable the optional Pages deploy job below.

name: Build & optional Pages deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # Enable only when CF Git integration is NOT used and secrets are set:
  #   CLOUDFLARE_API_TOKEN  — API token with Cloudflare Pages Edit
  #   CLOUDFLARE_ACCOUNT_ID — Account ID from CF dashboard
  deploy:
    name: Deploy to Cloudflare Pages
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' &&
      secrets.CLOUDFLARE_API_TOKEN != '' &&
      secrets.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=mossymesh-com
